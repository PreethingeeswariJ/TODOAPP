
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Todo App</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: linear-gradient(135deg, #42a5f5, #478ed1);
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial;
}

.todo-container {
  background: white;
  width: 420px;
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 15px 30px rgba(0,0,0,.25);
}

h2 {
  text-align: center;
  color: #1976d2;
}

.input-box {
  display: flex;
  gap: 8px;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

button {
  border: none;
  padding: 8px 12px;
  border-radius: 6px;
  cursor: pointer;
}

.add-btn { background:#1976d2;color:white; }
.status-btn { background:#43a047;color:white; }
.undo-btn { background:#757575;color:white; }
.edit-btn { background:#ffa000;color:white; }
.delete-btn { background:#e53935;color:white; }

ul { list-style:none;padding:0;margin-top:20px; }

li {
  background:#f5f5f5;
  padding:10px;
  border-radius:6px;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.completed {
  text-decoration: line-through;
  color: gray;
}
</style>
</head>

<body>
<div class="todo-container">
  <h2>📝 Todo App</h2>

  <div class="input-box">
    <input id="todoInput" placeholder="Enter todo">
    <button class="add-btn" onclick="saveTodo()">Save</button>
  </div>

  <ul id="todoList"></ul>
</div>

<script>
const API = "http://localhost:3004/todos";
let editId = null;

loadTodos();

async function loadTodos() {
  const res = await fetch(API);
  const todos = await res.json();

  todoList.innerHTML = "";

  todos.forEach(todo => {
    todoList.innerHTML += `
      <li>
        <span class="${todo.completed ? "completed" : ""}">
          ${todo.text}
        </span>
        <div>
          <button class="${todo.completed ? "undo-btn" : "status-btn"}"
            onclick="toggleStatus(${todo.id}, ${todo.completed})">
            ${todo.completed ? "Undo" : "Done"}
          </button>

          <button class="edit-btn"
            onclick="editTodo(${todo.id}, '${todo.text}')">
            Edit
          </button>

          <button class="delete-btn"
            onclick="deleteTodo(${todo.id})">
            Delete
          </button>
        </div>
      </li>`;
  });
}

async function saveTodo() {
  const text = todoInput.value.trim();
  if (!text) return;

  if (editId === null) {
    await fetch(API, {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({ text })
    });
  } else {
    await fetch(`${API}/${editId}`, {
      method:"PUT",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({ text })
    });
    editId = null;
  }

  todoInput.value = "";
  loadTodos();
}

function editTodo(id, text) {
  todoInput.value = text;
  editId = id;
}

async function toggleStatus(id, completed) {
  await fetch(`${API}/${id}`, {
    method:"PUT",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({ completed: !completed })
  });
  loadTodos();
}

async function deleteTodo(id) {
  await fetch(`${API}/${id}`, { method:"DELETE" });
  loadTodos();
}
</script>
</body>
</html>
